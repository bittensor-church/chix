# Pylon Capabilities — bittensor requirements → pylon solutions

# ============================================================================
# SUBTENSOR COMMUNICATION
# bittensor ref: sdk.quick_reference.yaml
# ============================================================================

subtensor_communication:
  bittensor_requirement: "query chain, submit transactions"
  pylon_solution: HTTP REST proxy to subtensor
  replaces:
    - "direct subtensor connection"
    - "bittensor SDK dependency on validator"
    - "wallet management on validator"
  protocol: HTTP/JSON
  auth: bearer token

# ============================================================================
# METAGRAPH ACCESS
# bittensor ref: bittensor.core.yaml → metagraph
# ============================================================================

metagraph_access:
  bittensor_requirement: "metagraph.sync() → neuron arrays"
  pylon_solution: cached neuron queries
  operations:
    latest_neurons: "fresh from chain (slower)"
    recent_neurons: "from cache (fast, preferred by nexus)"
    neurons_at_block: "historical query"
    latest_validators: "validators only"
  caching:
    mechanism: in-memory with background refresh
    soft_limit: "warning if data older than N blocks (default 100)"
    hard_limit: "error if data older than N blocks (default 150)"
    refresh: "APScheduler background job"
  neuron_data_includes:
    - uid, hotkey, coldkey
    - ip, port, protocol
    - stake (alpha, tao, total)
    - incentive, emission, dividends
    - validator_permit, trust, consensus, rank

# ============================================================================
# WEIGHT SETTING
# bittensor ref: validator.contract.yaml → weight_setting
# ============================================================================

weight_setting:
  bittensor_requirement: "normalize → submit → respect rate limits → optional commit-reveal"
  pylon_solution: background task with automatic retry and commit-reveal detection
  handled:
    - automatic commit-reveal detection (checks hyperparams)
    - commit-reveal flow when enabled (commit → wait → reveal)
    - direct weight submission when commit-reveal disabled
    - retry up to 200 attempts with exponential backoff
    - rate limit compliance
  input: "{hotkey: weight} dict"
  async: true (task queued, returns immediately)

# ============================================================================
# COMMITMENT MANAGEMENT
# bittensor ref: miner.contract.yaml → endpoint_commitment
# ============================================================================

commitment_management:
  bittensor_requirement: "commit data to chain, rate limited 1 per 100 blocks"
  pylon_solution: background task with retry
  handled:
    - hex data submission
    - retry up to 10 attempts
    - read commitments by hotkey or all

# ============================================================================
# WALLET SECURITY
# bittensor ref: ops.principles.yaml → wallet_security
# ============================================================================

wallet_security:
  bittensor_requirement: "coldkey air-gapped, hotkey on server"
  pylon_solution: wallet isolation on pylon server
  handled:
    - wallets stored only on pylon server
    - validator process never touches keys
    - per-identity token auth (not key-based)
    - signing happens server-side
  identity_model:
    one_identity: "= one wallet + hotkey + subnet"
    multiple_subnets: "multiple identities on one pylon instance"

# ============================================================================
# ADDITIONAL CAPABILITIES
# ============================================================================

additional:
  block_info:
    - latest block (number, hash, timestamp)
    - extrinsic lookup by block + index

  certificates:
    - read neuron certificates
    - generate certificate keypair

  observability:
    - prometheus metrics (request duration, operation counts, task stats)
    - sentry error tracking
    - request ID tracing
    - structured logging

  reliability:
    - connection pooling (one client per wallet)
    - request timeout enforcement (per-request + global max)
    - client-side retry (3 attempts, exponential backoff)
    - graceful degradation on cache staleness
