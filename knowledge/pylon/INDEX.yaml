# Pylon Knowledge Base
# Subtensor communication proxy for Bittensor

files:
  pylon.capabilities.yaml: "bittensor requirements → pylon solutions"
  pylon.topology.yaml: "how pylon fits into the validator stack"

covers:
  subtensor_communication: fully
  metagraph_queries: fully (with caching)
  weight_setting: fully (with commit-reveal, retries)
  commitment_management: fully
  wallet_security: fully (keys never leave pylon server)
  certificate_management: fully

does_not_cover:
  miner_communication: "nexus handles this"
  scoring: "nexus + developer handle this"
  epistula_signing: "for miner-facing requests — not yet integrated"

