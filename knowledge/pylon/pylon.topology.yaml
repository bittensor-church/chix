# Pylon Topology — how it fits into the validator stack

# ============================================================================
# PYLON COMPONENTS
# ============================================================================

components:
  pylon_server:
    runs_as: Docker container (sidecar to validator)
    requires:
      - wallet files mounted
      - env file with identity + network config
    connects_to: subtensor RPC

  pylon_client:
    installation:
      pypi: bittensor-pylon-client
    used_by: nexus (imported as dependency)
    connects_to: pylon server over HTTP

# ============================================================================
# DATA FLOW
# ============================================================================

#  subtensor chain
#       ↕ (RPC)
#  pylon server (Docker, port 8000)
#    - wallet management
#    - caching
#    - background tasks (weights, commitments)
#       ↕ (HTTP/JSON + bearer token)
#  pylon client (in-process library)
#       ↕ (function calls)
#  nexus actors (validator process)
#    - NeuronRouter reads metagraph
#    - BlockBeat reads block info
#    - WeightSetter submits weights

# ============================================================================
# ACCESS MODES
# ============================================================================

access_modes:
  open_access:
    auth: shared token
    operations: read-only (neurons, blocks, commitments, certificates)
    used_by: [neuron_router, block_beat]

  identity:
    auth: per-identity token
    operations: read + write (weights, commitments, certificates)
    used_by: [weight_setter]
    requires: wallet configured on pylon server

# ============================================================================
# CONFIGURATION
# ============================================================================

configurable:
  validator_side: [pylon_address, access_token, identity_credentials]
  server_side: [subtensor_network, wallet_identity_mapping, cache_freshness, retry_behavior]
  mechanism: env vars (both sides)

# ============================================================================
# LOCAL DEVELOPMENT
# bittensor ref: local.development.yaml
# ============================================================================

local_dev:
  subtensor: "docker-compose (ws://localhost:9944)"
  pylon: "point PYLON_BITTENSOR_NETWORK to local subtensor"
  note: "same pylon image, just different network config"
