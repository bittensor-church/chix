knowledge:
  bittensor:
    subdirectory: bittensor
    contents:
      - "critical knowledge about the specifics of framing subnet ideas into the bittensor ecosystem"
      - "critical technical requirements and invariants that must be satisfied by subnet design and code"
      - "suggested external integrations and tools"

  nexus:
    subdirectory: nexus
    what_it_is: "the coding framework for implementing bittensor subnets"
    contents: "high level overview, capabilities, core concepts and usage"
    gist: "nexus handles technical details and best practices for implementing bittensor subnets"

  pylon:
    subdirectory: pylon
    what_it_is: the subtensor communication proxy for safe and convenient bittensor chain querying and operations
    contents: "high level overview, capabilities and operational principles"
    gist: "pylon replaces bittensor SDK when communicating with a subtensor"

file_loading_rules:
  index_files: [ never_summarize, read_fully, follow_recursively ]

task_routing:
  designing_subnet:
    requires: [ user_subnet_idea ]
    required_knowledge: [ bittensor ]
    do_not_load: [ nexus, pylon ]
    reasoning_effort: MAX
    definition_of_done:
      - "ALL design rules discovered and met"
      - "subnet design approved by user"
      - "subnet design written to a file"

  implementing_validator:
    requires: [ subnet_design_approved_by_user, project_directory_ready_for_development ]
    required_knowledge: [ bittensor, nexus, pylon ]
    definition_of_done:
      - "project directory ready for development"
      - "QA gates pass for empty project"
      - "validator.py created"
      - "README.md created / rewritten"
      - "QA gates pass after implementation"

  _default:
    when: "no task matches"
    then: { refer_to: "knowledge/bittensor/INDEX.yaml" }
    infer: [ required_knowledge, definition_of_done ]
