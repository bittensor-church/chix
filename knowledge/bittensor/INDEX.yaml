# Bittensor Subnet Development Knowledge Base
# Entry point for LLM agents

purpose: |
  Machine-optimized knowledge repository for designing and implementing
  Bittensor subnets. Start here, then load files based on your task.

# ============================================================================
# CRITICAL: Load subnet.invariants.yaml FIRST for any subnet work
# It contains non-negotiable rules that constrain all designs
# ============================================================================

files_by_category:
  core_rules:
    subnet.invariants.yaml: "NON-NEGOTIABLE constraints - LOAD FIRST"
    validator.rules.yaml: "validator trust model, ground truth, scoring"
    miner.rules.yaml: "miner development, communication"
    sybil.realities.yaml: "coldkey NOT sybil-proof, UID pressure"
    trust.assumptions.yaml: "what can/cannot be trusted"

  specifications:
    bittensor.core.yaml: "network, tokens, participants, keys, metagraph"
    subnet.lifecycle.yaml: "creation, activation, hyperparameters, epochs"
    validator.contract.yaml: "role, responsibilities, patterns"
    miner.contract.yaml: "role, communication, patterns"
    incentive.primitives.yaml: "design process, verification, scoring"

  mechanism_patterns:
    compute_auction.yaml: "fungible compute, price competition (Targon)"
    capacity_market.yaml: "always-on infra, usage-based (Chutes)"
    data_indexing.yaml: "unique datasets, sample verification"
    prediction_market.yaml: "future predictions, delayed ground truth"
    time_series_forecasting.yaml: "sequential predictions, baseline comparison"
    external_activity_verification.yaml: "third-party platform activity"
    adversarial_red_blue.yaml: "detection+generation, no validator truth"
    container_execution.yaml: "miners compete on code quality (Basilica)"

  integrations:
    chutes.integration.yaml: "SN64 LLM inference API"
    basilica.containers.yaml: "container execution for agent subnets"
    hippius.integration.yaml: "SN75 decentralized storage, S3/IPFS, provenance"
    dataverse.integration.yaml: "SN13 social data API, X and Reddit scraping"
    sdk.quick_reference.yaml: "Python SDK patterns, token trading"
    btcli.reference.yaml: "CLI command reference"
    local.development.yaml: "local subtensor setup"
    ops.principles.yaml: "deployment, monitoring, operations"

  guidance:
    design_flow.yaml: "interactive interview protocol for subnet design (4 phases + hard gate)"
    load_order.yaml: "context loading sequences by task"

  example_subnets:
    example.affine_sn120.yaml: "Affine - multi-env Pareto scoring for reasoning models"
    example.numinous_sn6.yaml: "Numinous - forecasting agents with Brier scoring"
    example.404gen_sn17.yaml: "404-GEN - 3D asset generation from text prompts"
    example.zeus_sn18.yaml: "Zeus - weather forecasting with ERA5 ground truth"
    example.kinitro_sn26.yaml: "Kinitro - robotic agent competitions on MetaWorld"
    example.bitmind_sn34.yaml: "BitMind GAS - adversarial deepfake detection"
    example.lium_sn51.yaml: "Lium - GPU rental marketplace with collateral"
    example.gradients_sn56.yaml: "Gradients/G.O.D - model fine-tuning tournaments"
    example.nova_sn68.yaml: "Nova - drug discovery with deterministic oracle"
    example.hippius_sn75.yaml: "Hippius - decentralized storage and compute"
    example.swarm_sn124.yaml: "Swarm - drone autopilot policy competition"

example_subnet_index:
  by_pattern:
    adversarial_red_blue: [example.bitmind_sn34.yaml]
    compute_auction: [example.affine_sn120.yaml]
    time_series_forecasting: [example.numinous_sn6.yaml, example.zeus_sn18.yaml]
    container_execution: [example.kinitro_sn26.yaml, example.gradients_sn56.yaml, example.swarm_sn124.yaml]
    capacity_market: [example.lium_sn51.yaml, example.hippius_sn75.yaml]
    data_indexing: []
    prediction_market: []
    external_activity_verification: []
  by_domain:
    ai_ml: [example.affine_sn120.yaml, example.gradients_sn56.yaml, example.404gen_sn17.yaml]
    science: [example.nova_sn68.yaml, example.zeus_sn18.yaml]
    infrastructure: [example.lium_sn51.yaml, example.hippius_sn75.yaml]
    media: [example.bitmind_sn34.yaml, example.404gen_sn17.yaml]
    finance: [example.numinous_sn6.yaml]
    robotics: [example.kinitro_sn26.yaml, example.swarm_sn124.yaml]

task_routing:
  designing_new_subnet:
    mode: interview
    instruction: "Follow design_flow.yaml interview protocol. Do NOT skip to implementation."
    phases:
      exploration:
        load:
          - subnet.invariants.yaml
          - incentive.primitives.yaml
        purpose: "Understand the idea, identify commodity type, map to bittensor model"
        agent_action: "Ask what the subnet does, who benefits, what miners provide"
        kb_surfacing: "Reference example_subnet_index for domain matches"

      constraint_validation:
        load:
          - trust.assumptions.yaml
          - sybil.realities.yaml
          - validator.rules.yaml
        purpose: "Test the idea against bittensor's trust model and hard constraints"
        agent_action: "Challenge ground truth source, sybil assumptions, compute distribution"
        kb_surfacing: "Quote specific rules that the idea may violate"

      pattern_matching:
        load:
          - design_flow.yaml
        also_load: "{matched_pattern}.yaml"
        purpose: "Select and discuss mechanism pattern with user"
        agent_action: "Present 1-2 candidate patterns with tradeoffs, let user decide"
        kb_surfacing: "Show example subnets using each candidate pattern"

      design_gate:
        type: HARD
        requires:
          - measurement_one_sentence: "Clear single-sentence answer to 'what am I measuring?'"
          - commodity_type_identified: "Maps to one of: inference, compute, data, predictions, external_work, availability"
          - ground_truth_source: "Identified and validated (not validator-controlled, not secret)"
          - trust_check_passed: "No secret eval sets, no similarity reliance, no coldkey sybil"
          - compute_distribution_correct: "Expensive compute on miners, not validators"
          - pattern_selected: "User agrees on mechanism pattern"
          - sybil_considered: "User understands UID pressure, not relying on identity"
          - integrations_identified: "Required cross-subnet integrations listed"
        on_fail: "Return to the specific phase that has unresolved issues"

      implementation:
        load:
          - "{selected_pattern}.yaml"
          - validator.contract.yaml
          - sdk.quick_reference.yaml
        then: "Generate validator.py following design_flow.yaml output_format"

  implementing_validator:
    load:
      - subnet.invariants.yaml
      - validator.rules.yaml
      - validator.contract.yaml
      - "{selected_pattern}.yaml"
      - sdk.quick_reference.yaml

  understanding_attacks:
    load:
      - trust.assumptions.yaml
      - sybil.realities.yaml
      - incentive.primitives.yaml

  local_development:
    load:
      - local.development.yaml
      - sdk.quick_reference.yaml
      - btcli.reference.yaml

  container_agent_subnet:
    load:
      - subnet.invariants.yaml
      - container_execution.yaml
      - basilica.containers.yaml
      - chutes.integration.yaml

  chutes_integration:
    load:
      - chutes.integration.yaml
      - validator.contract.yaml

  hippius_storage:
    load:
      - hippius.integration.yaml
      - validator.contract.yaml
    use_when:
      - storing_evaluation_datasets
      - miner_artifact_submission
      - provenance_verification
      - large_file_distribution

  dataverse_social_data:
    load:
      - dataverse.integration.yaml
      - validator.contract.yaml

  cli_operations:
    load:
      - btcli.reference.yaml

  token_trading:
    load:
      - sdk.quick_reference.yaml

  studying_example_subnets:
    load:
      - subnet.invariants.yaml
      - "{example_file}.yaml"
    then: "load corresponding pattern files referenced in knowledge_connections"
    available_examples:
      - example.affine_sn120.yaml
      - example.numinous_sn6.yaml
      - example.404gen_sn17.yaml
      - example.zeus_sn18.yaml
      - example.kinitro_sn26.yaml
      - example.bitmind_sn34.yaml
      - example.lium_sn51.yaml
      - example.gradients_sn56.yaml
      - example.nova_sn68.yaml
      - example.hippius_sn75.yaml
      - example.swarm_sn124.yaml

critical_doctrines:
  - "Validator-only development: ONLY write validator.py, NEVER miner code"
  - "'What am I measuring?' must answer in ONE sentence"
  - "Axon/Dendrite/Synapse: DEPRECATED, use HTTP + Epistula"
  - "Open source > black box mechanisms"
  - "Validators NOT trusted individually"
  - "Secret eval sets WILL leak"
  - "Coldkeys NOT sybil-proof (UID pressure is real protection)"
  - "Compute costs → miners, not validators"
  - "Commit-reveal weights: mature subnet tool only"
  - "Containers required when miners compete on software"
  - "Provenance via Hippius: timestamp data to prove temporal ordering"
  - "Social data via Dataverse: X and Reddit scraping for agent reasoning"
