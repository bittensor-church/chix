# Nexus Boundaries — framework vs subnet developer

# ============================================================================
# NEXUS HANDLES (the subnet developer does not need to build these)
# ============================================================================

nexus_handles:
  runtime:
    - "actor lifecycle — startup, shutdown, error isolation"
    - "thread management — one thread per actor, all managed by the framework"
    - "message routing along declared wires"

  chain_integration:
    - "block and epoch tracking via pylon polling"
    - "weight submission at epoch boundaries via pylon"
    - "metagraph access and neuron discovery via pylon"

  miner_communication:
    - "async HTTP request/response with callbacks and timeouts"
    - "pending request tracking and timeout sweeping"
    - "endpoint discovery from metagraph"

  local_execution:
    - "in-process executor using the same interface as remote communication"

  result_management:
    - "task result storage with pluggable backends"
    - "result accumulation for weight calculation"
    - "timestamping of task execution"

  resilience:
    - "retry with configurable backoff"
    - "error routing as typed messages through the pipeline"
    - "context persistence and state recovery from logs"
    - "transient pylon failure tolerance in chain producers"

  entry_points:
    - "HTTP server for accepting external requests into the pipeline"

  integrations:
    available:
      - "S3-compatible storage with presigned URL generation"
      - "OpenRouter for LLM inference"
    planned: |
      Bittensor-backed services are being integrated as available
      building blocks. Check the source for the current set.

# ============================================================================
# SUBNET DEVELOPER PROVIDES (the domain-specific logic nexus cannot know)
# ============================================================================

developer_provides:
  description: |
    These are the subnet-specific pieces that nexus needs as input to
    execute the validator logic. They are typically small functions or
    types injected as parameters into framework-provided building blocks.

  payload_creation:
    what: "how to transform pipeline input into what the miner receives"
    example_concerns: "generate task parameters, prepare data for upload"

  result_conversion:
    what: "how to transform raw miner responses into a storable, scorable form"
    example_concerns: "extract relevant fields, validate response format"

  weighing_function:
    what: "how to turn accumulated task results into a hotkey-to-weight map"
    this_is: "the subnet's core scoring logic"

  input_source:
    what: "what triggers task processing"
    options: "HTTP endpoint, producer actor, external poller — or use the provided building blocks"

  neuron_filtering:
    what: "which neurons to consider for task routing"
    note: "built-in filters exist for common cases; custom predicates can be provided"

  routing_strategy:
    what: "how to select from filtered neurons"
    note: "built-in strategies exist; custom selection logic can be provided"

# ============================================================================
# CONFIGURATION
# ============================================================================

configuration:
  mechanism: "environment variables"
  no_config_files: true
  discovery: |
    Required and optional environment variables are defined alongside
    the components that use them. Explore the source to find what each
    component expects.

# ============================================================================
# RELATIONSHIP TO PYLON
# ============================================================================

pylon:
  rule: "never use bittensor SDK directly — all chain communication goes through pylon"
  nexus_uses_pylon_for:
    - "block and epoch polling"
    - "metagraph and neuron data"
    - "weight submission"
  developer_uses_pylon_for:
    - "anything else that requires chain interaction (e.g., commitment management)"
  see: "knowledge/pylon/ for pylon-specific knowledge"
