# ============================================================================
# EXPLORATION GUIDANCE
# ============================================================================

exploration: |
  This knowledge base describes nexus at a conceptual level. Specific building
  blocks, interfaces, and APIs must be discovered from the source code and
  bundled documentation. The framework ships with docs alongside the code.

  Before implementing anything:
  1. Read the bundled documentation index in the installed package
  2. Explore the available node and actor implementations
  3. Study the example actors for patterns
  4. Look for a high-level validator entry point — it exists and handles
     most of the wiring automatically

  The source is the authority. This KB tells you what to look for and why.

discovery_paths:
  bundled_docs: ".venv — look for a docs directory within the nexus package"
  actors: ".venv — look for actor implementations within the nexus package"
  examples: ".venv — look for example actors within the nexus package"
  core: ".venv — look for core abstractions (nodes, flows, runtime) within the nexus package"
  utilities: ".venv — look for utility modules within the nexus package"

