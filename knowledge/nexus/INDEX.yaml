# Nexus Framework Knowledge Base
# Validator framework for Bittensor subnets

# ============================================================================
# WHAT NEXUS IS
# ============================================================================

purpose: |
  Nexus is an opinionated framework for building Bittensor subnet validators.
  It absorbs operational complexity — runtime management, miner communication,
  chain synchronization, state persistence, error isolation — so that subnet
  builders focus exclusively on their domain logic.

  Nexus replaces the bittensor SDK for validator development. It depends on
  pylon for all chain communication. There is no bittensor SDK dependency.

philosophy: |
  A validator is a pipeline of independent processing units (actors) running
  in parallel, passing typed messages between each other. Each actor is a
  simple synchronous loop in its own thread. Failures are isolated to the
  actor that caused them. The framework manages the runtime, not the developer.

  No async code. No shared mutable state. No manual thread management.

